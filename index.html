<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud Dictionary</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>☁️ AI Cloud Tutor</h1>
    <p class="subtitle">Ask any cloud concept like a chatbot</p>

    <div id="chatBox" class="chat-box"></div>
     <div class="prompt-chips">
     <button onclick="usePrompt('What is AWS Lambda?')"> ☁️ Lambda </button>
     <button onclick="usePrompt('Compare S3 and EBS')">🔁 S3 vs EBS </button>
     <button onclick="usePrompt('Explain Docker')">🐳 Docker</button>
     <button onclick="usePrompt('AWS DevOps roadmap')">🚀 DevOps</button>
 </div>
 
    <div class="search-box">
      <input type="text" id="termInput" placeholder="Ask something...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
