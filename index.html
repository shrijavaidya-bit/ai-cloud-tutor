<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Cloud Tutor</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>☁️ AI Cloud Tutor</h1>
        <p>Ask any cloud concept like a chatbot</p>

        <div id="chatBox" class="chat-box"></div>

        <div class="quick-buttons">
            <button onclick="setPrompt('What is Lambda?')">☁️ Lambda</button>
            <button onclick="setPrompt('S3 vs EBS')">🗂️ S3 vs EBS</button>
            <button onclick="setPrompt('What is Docker?')">🐳 Docker</button>
            <button onclick="setPrompt('Explain DevOps')">🚀 DevOps</button>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="termInput"
                placeholder="Ask something..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
